function calcAll(form, overrideFleteUnit = null, cantCajas = 500, overrideTara = null, overrideWh = null, overrideTariff = null) {
  var { region, condicion, producto, pack, destino, despacho, warehouse, sp, cubicacion } = form;
  var despachoK = despachoKey(despacho); // key for D.fletes / D.wh lookups

  // Product params
  var prodKey = `${region}|${condicion}|${producto}`;
  var prod = D.products[prodKey];
  if (!prod) return null;

  var famPack = prod.FamiliaPack || "";
  var yield_base = prod.yield_ || 0;
  var gwKey = `${region}|${famPack}|${pack}`;
  var giveaway = GW_DATA[gwKey] || 1.0;
  var yield_ = yield_base * giveaway;
  var cv = prod.cv || 0;
  var cf_wfe = prod.cf || 0;
  var cf = yield_ > 0 ? cf_wfe / yield_ : 0;  // CF per kg PT
  var frig = prod.frig || 0;
  // ExPlanta dinámica según cajas (solo para HON China SP / HON China / HON China DUM)
  var prodKeyForCajas = `${region}|${condicion}|${producto}`;
  var exp;
  var cajas = parseFloat(cantCajas) || 500;
  // Peso por caja según pack
  var kgPorCaja = pack.includes("5-6") ? 22 : 20;
  if (prodKeyForCajas === "X Region|Fresh|HON China SP") {
    exp = 1921 / (cajas * kgPorCaja) + 0.09;
  } else if (prodKeyForCajas === "XII Region|Fresh|HON China" || prodKeyForCajas === "XII Region|Fresh|HON China DUM") {
    exp = 4400 / (cajas * kgPorCaja);
  } else if (region === "XII Region" && despachoK === "Aéreo" && getMercadoFromDestino(destino) === "USA") {
    if (destino === "Usa-Mia (aéreo)") {
      exp = 4752 / 15000;
    } else if (destino === "Usa-LAX (aéreo)" || destino === "Usa-JFK (aéreo)") {
      exp = (903000 / 900) / 6000;
    } else {
      exp = prod.exp || 0;
    }
  } else {
    exp = prod.exp || 0;
  }

  // CE lookup
  var ceKey = `${region}|${famPack}|${pack}`;
  var ce = D.ce[ceKey] ?? null;

  // GFOB (all per kg PT)
  var gfob = ce != null ? cv + ce + cf + exp + frig : null;

  // Freight
  var fleteKey = `${region}|${despachoK}|${destino}`;
  var fleteData = D.fletes[fleteKey];
  var fleteUnit = fleteData ? fleteData.flete : null;
  var taraKey = `${condicion}|${pack}`;
  var tara = overrideTara !== null ? overrideTara : (D.taras[taraKey] ?? 1.0);

  // Override fleteUnit if manual mode active, then recalculate freight
  var effectiveFleteUnit = (overrideFleteUnit !== null) ? overrideFleteUnit : fleteUnit;

  var freight = null;
  if (effectiveFleteUnit != null) {
    if (despachoK === "Aéreo") {
      freight = effectiveFleteUnit * tara;
    } else if (despachoK === "Marítimo") {
      var cub = parseFloat(cubicacion);
      freight = cub > 0 ? (effectiveFleteUnit / cub) * tara : null;
    } else {
      freight = 0;
    }
  }

  // Market
  var mercado = getMercadoFromDestino(destino);
  var isUSA = mercado === "USA";
  var spNum = parseFloat(sp);
  if (isNaN(spNum) || spNum <= 0) return { yield_, cv, ce, cf, cf_wfe, frig, exp, gfob, fleteUnit: effectiveFleteUnit, tara, freight, mercado, isUSA, sp_kg: null, gfob_full: gfob };

  // Sales Price [USD/kg PT]
  var sp_kg = isUSA ? spNum / 0.4536 : spNum;

  // Warehouse, commission, tariff (USA only)
  var wh_total = 0, commission = 0, tariff_val = 0, total_ae = 0, tariff_auto = 0, tariff_pct_used = 0;
  if (isUSA) {
    var whKey = `${condicion}|${warehouse}|${despachoK}`;
    wh_total = overrideWh !== null ? overrideWh : ((D.wh[whKey] && warehouse) ? D.wh[whKey].total : 0);
    commission = (spNum - wh_total) * COMM_RATE;
    var effectiveTariffPct = overrideTariff !== null ? overrideTariff : TARIFF_PCT;
    var tariff_base = effectiveTariffPct > 0 ? ((spNum - wh_total) * (1 - COMM_RATE) / 0.4536 - (freight || 0)) * effectiveTariffPct * 0.4536 / (1 + effectiveTariffPct) : 0;
    tariff_auto = Math.max(0, tariff_base);
    tariff_val = tariff_auto;
    tariff_pct_used = effectiveTariffPct;
    total_ae = wh_total + commission + tariff_val;
  }

  // RMP
  var rmp = gfob != null && freight != null
    ? (sp_kg - (isUSA ? total_ae / 0.4536 : 0) - freight - gfob) * yield_
    : null;

  // FOB Price & Firm Price
  var fob_price = rmp != null ? rmp / yield_ + gfob : null;
  var firm_price = isUSA ? spNum - wh_total - commission - tariff_val : spNum;
  var retorno = rmp != null ? rmp / yield_ : null;

  // TDE — binary search
    var tde = null;
    var tdeRef2 = D.tde_base[state.region];
    if (tdeRef2 && rmp != null) {
      var ty2=tdeRef2.yield_, tg2=tdeRef2.gfob, tf2=tdeRef2.freight, twh2=tdeRef2.wh, tcr2=tdeRef2.comm_rate, ttp2=tdeRef2.tariff_pct;
      var lo2=0.01, hi2=60.0;
      for (var bi=0; bi<80; bi++) {
        var mid2=(lo2+hi2)/2;
        var tc2=(mid2-twh2)*tcr2;
        var tt2=Math.max(0,((mid2-twh2)*(1-tcr2)/0.4536-tf2)*ttp2*0.4536/(1+ttp2));
        var rm2=(mid2/0.4536-(twh2+tc2+tt2)/0.4536-tf2-tg2)*ty2;
        if (rm2 < rmp) lo2=mid2; else hi2=mid2;
      }
      tde = (lo2+hi2)/2;
    }

  return {
    yield_, yield_base, giveaway, cv, ce, cf, cf_wfe, frig, exp, gfob,
    fleteUnit: effectiveFleteUnit, tara, freight,
    mercado, isUSA,
    sp_kg, wh_total, commission, tariff_val, tariff_auto, tariff_pct_used, total_ae,
    rmp, tde, fob_price, firm_price, retorno, retorno_neto: retorno,
    famPack, ceKey, prodKey, fleteKey,
  };
}

var PRODUCTOS_CAJAS = new Set([

function findSpForRmp(form, targetRmp) {
  var lo = 0.01, hi = 200.0;
  for (var i = 0; i < 100; i++) {
    var mid = (lo + hi) / 2;
    var c = calcAll(Object.assign({}, form, { sp: String(mid) }));
    if (!c || c.rmp == null) return null;
    if (c.rmp < targetRmp) lo = mid; else hi = mid;
  }
  return (lo + hi) / 2;
}

function findSpForTde(form, targetTde) {
  var lo = 0.01, hi = 200.0;
  for (var i = 0; i < 100; i++) {
    var mid = (lo + hi) / 2;
    var c = calcAll(Object.assign({}, form, { sp: String(mid) }));
    if (!c || c.tde == null) return null;

  if (attrs) Object.entries(attrs).forEach(([k, v]) => {
    if (k === "style" && typeof v === "object") Object.assign(e.style, v);
    else if (k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === "className") e.className = v;
    else e.setAttribute(k, v);
  });
  children.flat().forEach(c => {
    if (c == null || c === false) return;
    e.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
  });
  return e;
}

function makeSelect(opts, value, onChange, disabled) {
  var s = el("select", {
    style: {
      width: "100%", padding: "12px", background: "rgba(255,255,255,.05)",
      border: `1px solid ${C.border}`, borderRadius: "8px", color: C.text,
      fontSize: "15px", fontFamily: "'Outfit',sans-serif", outline: "none",
      opacity: disabled ? ".4" : "1", marginBottom: "2px"
    },
    onChange: e => onChange(e.target.value)
  });
  if (disabled) s.disabled = true;
  s.appendChild(el("option", { value: "" }, "— Select —"));
  opts.forEach(o => {
    var opt = el("option", { value: o }, o);
    if (o === value) opt.selected = true;
    s.appendChild(opt);
  });
  return s;
}

function makeInput(value, onChange, placeholder, extraStyle) {
  var inp = el("input", {
    type: "text", inputmode: "decimal", value: value || "", placeholder: placeholder || "",
    style: {
      width: "100%", padding: "12px", background: "rgba(255,255,255,.05)",
      border: "1px solid " + C.border, borderRadius: "8px", color: C.text,
      fontSize: "15px", fontFamily: "'JetBrains Mono',monospace", outline: "none"
    }
  });
  if (extraStyle) Object.assign(inp.style, extraStyle);
  inp.addEventListener("blur", function(e) {
    var norm = e.target.value.replace(",", ".");
    e.target.value = norm;
    onChange(norm);
  });
  return inp;
}

function makeLocked(value, extraStyle) {
  return el("div", {
    style: {
      width: "100%", padding: "11px 12px", background: "rgba(255,255,255,.03)",
      border: "1px solid rgba(255,255,255,.07)", borderRadius: "8px", color: "#94a3b8",
      fontSize: "14px", fontFamily: "'JetBrains Mono',monospace", ...extraStyle
    }
  }, value || "—");
}

function makeField(label, content, accent) {
  return el("div", { style: { marginBottom: "14px" } },
    el("div", { style: { fontSize: "11px", color: accent || C.muted, fontWeight: "600", letterSpacing: ".6px", textTransform: "uppercase", marginBottom: "5px" } }, label),
    content
  );
}

function makeAdjBtn(active, onClick) {
  return el("button", {
    style: {
      fontSize: "10px", padding: "3px 8px",
      background: active ? "rgba(245,158,11,.2)" : "rgba(0,207,255,.1)",

      borderRadius: "5px", color: active ? C.amber : C.cyan,
      cursor: "pointer", fontWeight: "700", fontFamily: "'Outfit',sans-serif",
      letterSpacing: ".5px", textTransform: "uppercase", touchAction: "manipulation"
    },
    onClick
  }, active ? "✕ Auto" : "✎ Adjust");
}

function nextBtn(label, color, borderCol, onClick) {
  return el("button", {
    style: {

  d.appendChild(rmpCard);

  // Desglose
  if (calc?.rmp != null) {
    var desc = el("div", { style: { background: C.card, borderRadius: "14px", border: `1px solid ${C.border}`, padding: "16px", marginBottom: "14px" } });

    var rows = [

    var usaOpen = false;

        // Detail rows (hidden by default)

        [

      if (l === "_GFOB_HEADER_") {

        var gfobVal   = el("span", { style: { fontSize: "13px", color: C.red, fontFamily: "'JetBrains Mono',monospace", fontWeight: "700" } },

        gfobHeader.appendChild(gfobVal);
        var gfobDetail = el("div", { style: { display: "none" } });
        [
          ["  · CV",         "− $" + fmt(calc.cv,   4)],
          ["  · CE",         "− $" + fmt(calc.ce,   4)],
          ["  · CF/kg PT",   "− $" + fmt(calc.cf,   4)],
          ["  · ExPlanta",   "− $" + fmt(calc.exp,  4)],
          ["  · Cold Store", "− $" + fmt(calc.frig, 4)],

            el("span", { style: { fontSize: "11px", color: C.red, fontFamily: "'JetBrains Mono',monospace" } }, dr[1])
          ));
        });
        var gfobOpen2 = false;
        gfobHeader.onclick = function() {
          gfobOpen2 = !gfobOpen2;
          gfobLabel.textContent = (gfobOpen2 ? "▾" : "▸") + " − GFOB";
          gfobDetail.style.display = gfobOpen2 ? "block" : "none";
        };
        var gfobWrapper = el("div", {});
        gfobWrapper.appendChild(gfobHeader);
        gfobWrapper.appendChild(gfobDetail);
        desc.appendChild(gfobWrapper);
        return;
      }
      desc.appendChild(el("div", { style: { display: "flex", justifyContent: "space-between", padding: "5px 0", borderBottom: "1px solid rgba(255,255,255,.04)" } },
        el("span", { style: { fontSize: "12px", color: C.muted } }, l),
        el("span", { style: { fontSize: "13px", color: c, fontFamily: "'JetBrains Mono',monospace", fontWeight: "600" } }, v)
      ));
    });
    d.appendChild(desc);

    // Sensibilidad
    var sens = el("div", { style: { background: C.card, borderRadius: "14px", border: `1px solid ${C.border}`, padding: "16px" } });
    sens.appendChild(el("div", { style: { fontSize: "11px", color: C.cyan, letterSpacing: "2px", textTransform: "uppercase", marginBottom: "10px", fontWeight: "600" } }, "SP Sensitivity ±$0.30"));
    var table = el("table", { style: { width: "100%", borderCollapse: "collapse", fontSize: "12px" } });
    var thead = el("tr", {});
    ["SP", "RMP", "Trim D Eq"].forEach(h => {
      thead.appendChild(el("th", { style: { textAlign: "right", color: C.muted, fontWeight: "600", paddingBottom: "6px", fontSize: "11px" } }, h));
    });
    table.appendChild(el("thead", {}, thead));
    var tbody = el("tbody", {});
    [-0.30, -0.20, -0.10, 0, 0.10, 0.20, 0.30].forEach(d2 => {
      var sp2 = parseFloat(state.sp) + d2;
      if (sp2 <= 0) return;
      var fl = state.fleteManual.active && state.fleteManual.value ? parseFloat(state.fleteManual.value) : null;
      var tr2 = state.taraManual.active && state.taraManual.value ? parseFloat(state.taraManual.value) : null;
      var c2 = calcAll({ ...state, sp: String(sp2.toFixed(2)) }, fl, parseFloat(state.cantCajas) || 500, tr2);
      var isBase = Math.abs(d2) < 0.001;
      var rc = rmpColor(c2?.rmp);
      var row = el("tr", { style: { background: isBase ? "rgba(0,207,255,.08)" : "transparent" } });
      row.appendChild(el("td", { style: { textAlign: "right", padding: "5px 0", fontFamily: "'JetBrains Mono',monospace", color: isBase ? C.cyan : C.text, fontWeight: isBase ? "700" : "400" } },
        (isBase ? "▶ " : "") + sp2.toFixed(2)));
      row.appendChild(el("td", { style: { textAlign: "right", padding: "5px 0 5px 12px", fontFamily: "'JetBrains Mono',monospace", color: rc, fontWeight: "600" } },
        c2?.rmp != null ? c2.rmp.toFixed(4) : "—"));
      row.appendChild(el("td", { style: { textAlign: "right", padding: "5px 0 5px 12px", fontFamily: "'JetBrains Mono',monospace", color: "#94a3b8" } },

      tbody.appendChild(row);
    });
    table.appendChild(tbody);
    sens.appendChild(table);
    d.appendChild(sens);
  } else {
    d.appendChild(el("div", { style: { textAlign: "center", padding: "40px", color: C.muted, fontSize: "14px" } }, "Complete the fields to see the result"));
  }

  // Save to Favorites button
  if (calc?.rmp != null) {
    var saveBlock = el("div", { style: { marginTop: "14px" } });
    if (!state.saveMode) {
      var saveBtn = el("button", {
        style: { width: "100%", padding: "14px", background: "rgba(250,204,21,.08)",

      });
      inp.value = state.saveName || "";
      inp.addEventListener("input", function(e) { state.saveName = e.target.value; });

      var okBtn = el("button", {

    d.appendChild(saveBlock);
  }

  // Boton cambio region (solo si el mismo producto existe en la otra region)
  var otherRegionR = state.region === "X Region" ? "XII Region" : (state.region === "XII Region" ? "X Region" : null);
  if (otherRegionR && state.producto) {
    var altKey = otherRegionR + "|" + state.condicion + "|" + state.producto;
    if (D.products[altKey]) {
      var switchCard = el("div", { style: {
        marginTop: "16px", padding: "14px 16px",

        cursor: "pointer", fontFamily: "inherit",
        touchAction: "manipulation"

        state.taraManual  = { active: false, value: "" };
        state.whManual    = { active: false, value: "" };

        setTab(3);
      });
      switchCard.appendChild(swBtn);
      d.appendChild(switchCard);
    }
  }

  return d;
}

// ─── MAIN RENDER ──────────────────────────────────────────────────────────────
function setTab(i) { state.tab = i; render(); window.scrollTo(0, 0); }

function render() {
  var app = $("app");
  if (!app) return;
  var calc = getCalc();
  var col = rmpColor(calc?.rmp);

  app.innerHTML = "";

  // Header
  var hdr = el("div", { style: {
    background: "rgba(0,0,0,.5)", borderBottom: `1px solid ${C.border}`,
    padding: "12px 16px", display: "flex", alignItems: "center", gap: "10px",
    position: "sticky", top: "0", zIndex: "10", backdropFilter: "blur(12px)"
  }});
  var logoImg = el("img", { src: LOGO_SRC, alt: "Multi X", style: { height: "28px", mixBlendMode: "screen" } });
  var titleDiv = el("div", {},
    el("div", { style: { fontSize: "13px", fontWeight: "700", color: C.text, lineHeight: "1.1" } }, "Raw Material Return"),
    el("div", { style: { fontSize: "10px", color: C.muted } }, "HON Fillets · H1 26")
  );
  hdr.appendChild(logoImg);
  hdr.appendChild(titleDiv);
  // RMP badge + Favorites button
  var rightDiv = el("div", { style: { marginLeft: "auto", display: "flex", alignItems: "center", gap: "10px" } });
  if (calc?.rmp != null) {
    rightDiv.appendChild(el("div", { style: { textAlign: "right" } },
      el("div", { style: { fontSize: "10px", color: C.muted } }, "RMP"),
      el("div", { style: { fontSize: "18px", fontWeight: "700", color: col, fontFamily: "'JetBrains Mono',monospace" } }, "$" + calc.rmp.toFixed(3))
    ));
  }
  var favsBtn = el("button", {
    style: { padding: "7px 10px", background: state.favsOpen ? "rgba(250,204,21,.15)" : "rgba(255,255,255,.05)",
      border: "1px solid " + (state.favsOpen ? "rgba(250,204,21,.5)" : "rgba(255,255,255,.12)"),
      borderRadius: "8px", color: state.favsOpen ? "#facc15" : C.muted,
      fontSize: "13px", fontWeight: "700", cursor: "pointer", fontFamily: "inherit",
      touchAction: "manipulation", flexShrink: "0" }
  }, "☆" + (favs.length > 0 ? " " + favs.length : ""));
  favsBtn.addEventListener("click", function() { state.favsOpen = !state.favsOpen; state.saveMode = false; render(); });
  rightDiv.appendChild(favsBtn);
  hdr.appendChild(rightDiv);
  app.appendChild(hdr);

  // ── Favorites Panel ────────────────────────────────────────────────────────
  if (state.favsOpen) {
    var favsPanel = el("div", { style: { background: "rgba(250,204,21,.04)", borderBottom: "1px solid rgba(250,204,21,.15)", padding: "14px 16px" } });

    // Header row
    var fpHead = el("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "12px" } });
    fpHead.appendChild(el("div", { style: { fontSize: "11px", fontWeight: "700", color: "#facc15", letterSpacing: "2px", textTransform: "uppercase" } }, "☆ Saved Favorites"));
    if (state.compareIds.length === 2) {
      var clearBtn = el("button", {
        style: { padding: "4px 10px", background: "rgba(99,102,241,.15)", border: "1px solid rgba(99,102,241,.4)",
          borderRadius: "6px", color: "#818cf8", fontSize: "11px", fontWeight: "600",
          cursor: "pointer", fontFamily: "inherit", touchAction: "manipulation" }
      }, "✕ Clear");
      clearBtn.addEventListener("click", function() { state.compareIds = []; render(); });
      fpHead.appendChild(clearBtn);
    } else if (state.compareIds.length === 1) {
      fpHead.appendChild(el("div", { style: { fontSize: "11px", color: C.muted, fontStyle: "italic" } }, "Select one more"));
    }
    favsPanel.appendChild(fpHead);

    if (favs.length === 0) {
      favsPanel.appendChild(el("div", { style: { fontSize: "12px", color: C.muted, fontStyle: "italic" } }, "No favorites yet. Calculate a result and tap Save."));
    }

    // Cards
    favs.forEach(function(fav) {
      var sel = state.compareIds.includes(fav.id);
      var selIdx = state.compareIds.indexOf(fav.id);
      var card = el("div", { style: { display: "flex", alignItems: "center", gap: "10px",
        background: sel ? "rgba(99,102,241,.1)" : "rgba(255,255,255,.03)",
        border: "1px solid " + (sel ? "rgba(99,102,241,.5)" : "rgba(250,204,21,.2)"),
        borderRadius: "10px", padding: "10px 12px", marginBottom: "8px" } });

      // Compare toggle
      var cmpBtn = el("button", {
        style: { width: "24px", height: "24px", flexShrink: "0", borderRadius: "6px",
          background: sel ? "rgba(99,102,241,.3)" : "rgba(255,255,255,.06)",
          border: "1px solid " + (sel ? "rgba(99,102,241,.7)" : "rgba(255,255,255,.15)"),
          color: sel ? "#a5b4fc" : C.muted, fontSize: "10px", fontWeight: "700",
          cursor: "pointer", fontFamily: "inherit", touchAction: "manipulation" }
      }, sel ? String(selIdx + 1) : "⊞");
      cmpBtn.addEventListener("click", function() { toggleCompare(fav.id); });
      card.appendChild(cmpBtn);

      // Info → load on click
      var info = el("div", { style: { flex: "1", cursor: "pointer", minWidth: "0" } });
      info.appendChild(el("div", { style: { fontSize: "13px", fontWeight: "700", color: sel ? "#a5b4fc" : "#facc15", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" } }, fav.name));
      var sub = [fav.form.region, fav.form.producto, fav.form.destino].filter(Boolean).join(" · ");
      if (sub) info.appendChild(el("div", { style: { fontSize: "10px", color: C.muted, marginTop: "2px", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" } }, sub));
      if (fav.form.sp) info.appendChild(el("div", { style: { fontSize: "10px", color: C.cyan, marginTop: "1px" } }, "SP " + fav.form.sp));
      info.addEventListener("click", function() { loadFav(fav); });
      card.appendChild(info);

      // Delete
      var delBtn = el("button", {
        style: { background: "none", border: "none", color: "rgba(239,68,68,.5)", fontSize: "16px",
          cursor: "pointer", padding: "2px", flexShrink: "0", touchAction: "manipulation" }
      }, "✕");
      delBtn.addEventListener("click", function() { deleteFav(fav.id); });
      card.appendChild(delBtn);
      favsPanel.appendChild(card);
    });

    // ── Comparison table ──────────────────────────────────────────────────────
    if (state.compareIds.length === 2) {
      var fa = favs.find(function(f) { return f.id === state.compareIds[0]; });
      var fb = favs.find(function(f) { return f.id === state.compareIds[1]; });
      if (fa && fb) {
        var spAval = state.cmpSpA !== "" && !isNaN(parseFloat(state.cmpSpA)) ? parseFloat(state.cmpSpA) : null;
        var spBval = state.cmpSpB !== "" && !isNaN(parseFloat(state.cmpSpB)) ? parseFloat(state.cmpSpB) : null;
        var ca = calcFav(fa, spAval), cb = calcFav(fb, spBval);
        var spAval = state.cmpSpA !== "" && !isNaN(parseFloat(state.cmpSpA)) ? parseFloat(state.cmpSpA) : null;
        var spBval = state.cmpSpB !== "" && !isNaN(parseFloat(state.cmpSpB)) ? parseFloat(state.cmpSpB) : null;
        var ca = calcFav(fa, spAval), cb = calcFav(fb, spBval);
        if (ca && cb) {
          // SP override inputs row
          var spRow = el("div", { style: { display: "grid", gridTemplateColumns: "1fr 1fr", gap: "8px", padding: "8px 12px", background: "rgba(0,0,0,.3)", borderBottom: "1px solid rgba(255,255,255,.06)", marginBottom: "0" } });
          var mkSpInput = function(label, val, key, col) {
            var wrap = el("div", {});
            var lbl2 = el("div", { style: { fontSize: "9px", color: C.muted, letterSpacing: "1px", textTransform: "uppercase", marginBottom: "3px", textAlign: "center" } }, label);
            var inp = document.createElement("input");
            inp.type = "text"; inp.inputMode = "decimal";
            inp.value = val || "";
            inp.placeholder = key === "cmpSpA" ? (fa.form.sp || "—") : (fb.form.sp || "—");
            inp.style.cssText = "width:100%;padding:5px 8px;text-align:center;background:" + (val ? "rgba(99,102,241,.12)" : "rgba(255,255,255,.04)") + ";border:1px solid " + (val ? col : "rgba(255,255,255,.08)") + ";border-radius:6px;color:" + (val ? col : C.muted) + ";font-size:13px;font-family:'JetBrains Mono',monospace;outline:none;";
            inp.onblur = function() { set(key, inp.value.replace(",",".")); };
            inp.onkeydown = function(e) { if (e.key === "Enter") inp.blur(); };
            wrap.appendChild(lbl2); wrap.appendChild(inp);
            return wrap;
          };
          spRow.appendChild(mkSpInput("① SP (" + (ca.isUSA ? "USD/lb" : "USD/kg") + ")", state.cmpSpA, "cmpSpA", "#a5b4fc"));
          spRow.appendChild(mkSpInput("② SP (" + (cb.isUSA ? "USD/lb" : "USD/kg") + ")", state.cmpSpB, "cmpSpB", "#67e8f9"));
          cmpDiv.appendChild(spRow);
          if (state.cmpSpA || state.cmpSpB) {
            var resetBtn = el("button", { style: { width: "100%", padding: "4px", fontSize: "10px", background: "transparent", border: "none", color: C.muted, cursor: "pointer", marginTop: "2px" } }, "↩ Reset SP");
            resetBtn.onclick = function() { set("cmpSpA", ""); set("cmpSpB", ""); };
            cmpDiv.appendChild(resetBtn);
          }
          var wfe = function(v, y) { return (v != null && y != null) ? v * y : null; };
          var usaVal = function(c, v) { return c.isUSA ? v : 0; };
          var fmtN = function(v, d) { return (v != null && isFinite(v)) ? v.toFixed(d != null ? d : 4) : "—"; };
          var fmtPct = function(v) { return (v != null && isFinite(v)) ? (v * 100).toFixed(2) + " %" : "—"; };
          var dlt = function(va, vb, d) {
            if (va == null || vb == null || !isFinite(va) || !isFinite(vb)) return { txt: "—", pos: null };
            var diff = va - vb;
            var pos = diff > 0.0001 ? true : diff < -0.0001 ? false : null;
            return { txt: (pos === true ? "+" : "") + diff.toFixed(d != null ? d : 4), pos: pos };
          };
          var dltPct = function(va, vb) {
            if (va == null || vb == null) return { txt: "—", pos: null };
            var diff = (va - vb) * 100;
            var pos = diff > 0.001 ? true : diff < -0.001 ? false : null;
            return { txt: (pos === true ? "+" : "") + diff.toFixed(2) + " %", pos: pos };
          };
          var dColor = function(pos) { return pos === true ? "#4ade80" : pos === false ? "#f87171" : C.muted; };

          var tbl = el("div", { style: { background: "rgba(0,0,0,.3)", border: "1px solid rgba(99,102,241,.25)", borderRadius: "10px", overflow: "hidden", marginTop: "14px" } });

          // Table header
          var thRow = el("div", { style: { display: "grid", gridTemplateColumns: "1fr 80px 80px 72px", padding: "8px 10px", background: "rgba(99,102,241,.1)", borderBottom: "1px solid rgba(99,102,241,.2)" } });
          thRow.appendChild(el("div", { style: { fontSize: "10px", color: C.muted, letterSpacing: "1px", textTransform: "uppercase" } }, ""));
          thRow.appendChild(el("div", { style: { fontSize: "10px", fontWeight: "700", color: "#a5b4fc", textAlign: "right", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" } }, "① " + fa.name));
          thRow.appendChild(el("div", { style: { fontSize: "10px", fontWeight: "700", color: "#67e8f9", textAlign: "right", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" } }, "② " + fb.name));
          thRow.appendChild(el("div", { style: { fontSize: "10px", color: C.muted, textAlign: "right" } }, "Δ"));
          tbl.appendChild(thRow);

          var showUSA = ca.isUSA || cb.isUsA || cb.isUSA;
          var cmpRows = [
            { label: "Yield",         isPct: true,  vA: ca.yield_,  vB: cb.yield_ },
            { label: "SP",            unit: "WFE",  vA: wfe(ca.sp_kg, ca.yield_), vB: wfe(cb.sp_kg, cb.yield_) },
          ];
          if (showUSA) {
            cmpRows.push({ label: "− USA Costs", unit: "WFE", bold: true, sep: true, collapsible: true,
              vA: wfe(-usaVal(ca, ca.total_ae/0.4536), ca.yield_), vB: wfe(-usaVal(cb, cb.total_ae/0.4536), cb.yield_) });
            if (state.usaExpanded) {
              cmpRows.push({ label: "· WH",   unit: "WFE", indent: true, vA: wfe(-usaVal(ca, ca.wh_total/0.4536),   ca.yield_), vB: wfe(-usaVal(cb, cb.wh_total/0.4536),   cb.yield_) });
              cmpRows.push({ label: "· Comm",  unit: "WFE", indent: true, vA: wfe(-usaVal(ca, ca.commission/0.4536), ca.yield_), vB: wfe(-usaVal(cb, cb.commission/0.4536), cb.yield_) });
              cmpRows.push({ label: "· Tariff",unit: "WFE", indent: true, vA: wfe(-usaVal(ca, ca.tariff_val/0.4536), ca.yield_), vB: wfe(-usaVal(cb, cb.tariff_val/0.4536), cb.yield_) });
            }
          }
          cmpRows = cmpRows.concat([
            { label: "− Freight",    unit: "WFE",  sep: true, vA: wfe(-ca.freight, ca.yield_), vB: wfe(-cb.freight, cb.yield_) },
            { label: "FOB Price",    unit: "WFE",  sep: true, bold: true, vA: wfe(ca.fob_price, ca.yield_), vB: wfe(cb.fob_price, cb.yield_) },
            { label: "− GFOB",       unit: "WFE",  vA: wfe(-ca.gfob, ca.yield_), vB: wfe(-cb.gfob, cb.yield_) },
            { label: "RMP",          unit: "WFE",  sep: true, big: true, vA: ca.rmp, vB: cb.rmp },
            { label: "TDE",          unit: "lb",   big: true, vA: ca.tde, vB: cb.tde },
          ]);

          cmpRows.forEach(function(row) {
            var d_ = row.isPct ? dltPct(row.vA, row.vB) : dlt(row.vA, row.vB);
            var vAstr = row.isPct ? fmtPct(row.vA) : fmtN(row.vA);
            var vBstr = row.isPct ? fmtPct(row.vB) : fmtN(row.vB);
            var bg = (row.big || row.bold || row.collapsible) ? "rgba(255,255,255,.03)" : "transparent";
            var bdr = row.sep ? "1px solid rgba(255,255,255,.06)" : "none";
            var r = el("div", { style: { display: "grid", gridTemplateColumns: "1fr 80px 80px 72px",
              padding: row.indent ? "5px 10px 5px 18px" : "7px 10px", borderTop: bdr,
              background: bg, cursor: row.collapsible ? "pointer" : "default" } });

            var lbl = el("div", { style: { fontSize: row.big ? "12px" : row.indent ? "10px" : "11px",
              fontWeight: (row.bold || row.big) ? "700" : "400",
              color: row.big ? C.text : row.indent ? C.muted : C.label } });
            if (row.collapsible) {
              var arrSpan = el("span", { style: { fontSize: "9px", color: "#facc15", marginRight: "3px" } }, state.usaExpanded ? "▾" : "▸");
              lbl.appendChild(arrSpan);
            }
            lbl.appendChild(document.createTextNode(row.label));
            if (row.unit) lbl.appendChild(el("span", { style: { fontSize: "9px", color: C.muted, marginLeft: "3px" } }, row.unit));
            r.appendChild(lbl);

            var colA = row.indent ? "rgba(165,180,252,.5)" : "#a5b4fc";
            var colB = row.indent ? "rgba(103,232,249,.5)" : "#67e8f9";
            r.appendChild(el("div", { style: { fontSize: row.big ? "13px" : row.indent ? "10px" : "11px", fontWeight: (row.big||row.bold)?"700":"400", textAlign: "right", color: colA, fontFamily: "'JetBrains Mono',monospace" } }, vAstr));
            r.appendChild(el("div", { style: { fontSize: row.big ? "13px" : row.indent ? "10px" : "11px", fontWeight: (row.big||row.bold)?"700":"400", textAlign: "right", color: colB, fontFamily: "'JetBrains Mono',monospace" } }, vBstr));
            r.appendChild(el("div", { style: { fontSize: row.big ? "13px" : row.indent ? "10px" : "11px", fontWeight: (row.big||row.bold)?"700":"400", textAlign: "right", color: dColor(d_.pos), fontFamily: "'JetBrains Mono',monospace" } }, d_.txt));

            if (row.collapsible) {
              r.addEventListener("click", function() { state.usaExpanded = !state.usaExpanded; render(); });
            }
            tbl.appendChild(r);
          });
          favsPanel.appendChild(tbl);
        }
      }
    }

    app.appendChild(favsPanel);
  }

  // Tabs
  var tabs = [{ icon: "🐟", label: "Product" }, { icon: "✈️", label: "Destination" }, { icon: "⚙️", label: "Costs" }, { icon: "💰", label: "Result" }];
  var tabBar = el("div", { style: { display: "flex", background: "rgba(0,0,0,.3)", borderBottom: `1px solid ${C.border}`, position: "sticky", top: "53px", zIndex: "9" } });
  tabs.forEach((t, i) => {
    var btn = el("button", {
      style: {
        flex: "1", padding: "10px 4px", background: "transparent", border: "none",
        borderBottom: `2px solid ${state.tab === i ? C.cyan : "transparent"}`,
        color: state.tab === i ? C.cyan : C.muted, cursor: "pointer",
        fontFamily: "'Outfit',sans-serif", fontSize: "10px", fontWeight: "600",
        textTransform: "uppercase", letterSpacing: ".5px", touchAction: "manipulation"
      },
      onClick: () => setTab(i)
    },
      el("div", { style: { fontSize: "16px", marginBottom: "2px" } }, t.icon),
      t.label
    );
    tabBar.appendChild(btn);
  });
  app.appendChild(tabBar);

  // Content
  var content = el("div", { style: { padding: "16px 16px 100px" } });
  if (state.tab === 0) content.appendChild(renderTabProducto());
  else if (state.tab === 1) content.appendChild(renderTabDestino());
  else if (state.tab === 2) content.appendChild(renderTabCostos());
  else content.appendChild(renderTabResultado());
  app.appendChild(content);
}

// Init
// Start app directly - DOMContentLoaded already fired since scripts are at bottom of body
autoFill();
render();
</script>
</body></html>
